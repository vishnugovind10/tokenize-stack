<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>tokenize-stack console</title>
    <style>
      :root {
        color: #172026;
        background: #f5f7f8;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      }
      body {
        margin: 0;
      }
      header {
        border-bottom: 1px solid #d8dee3;
        padding: 18px 28px;
        background: #ffffff;
      }
      main {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        padding: 24px;
      }
      section {
        background: #ffffff;
        border: 1px solid #d8dee3;
        border-radius: 8px;
        padding: 16px;
        min-height: 160px;
      }
      h1, h2 {
        margin: 0;
        font-size: 18px;
      }
      h2 {
        font-size: 14px;
        margin-bottom: 12px;
      }
      table {
        border-collapse: collapse;
        width: 100%;
        font-size: 13px;
      }
      td {
        border-top: 1px solid #e6eaed;
        padding: 8px 0;
      }
      .ok {
        color: #0d684f;
        font-weight: 700;
      }
      .fail {
        color: #a43731;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <header><h1>tokenize-stack console</h1></header>
    <main>
      <section>
        <h2>Asset & Holders</h2>
        <table><tr><td>Issuer</td><td>750000</td></tr><tr><td>Investors</td><td>250000</td></tr></table>
      </section>
      <section>
        <h2>Trades</h2>
        <table><tr><td>Happy path</td><td class="ok">SETTLED</td></tr><tr><td>Failure demo</td><td class="fail">UNWOUND</td></tr></table>
      </section>
      <section>
        <h2>Coupon Rounds</h2>
        <table><tr><td>Cursor</td><td>complete</td></tr><tr><td>Duplicate payments</td><td class="ok">0</td></tr></table>
      </section>
      <section>
        <h2>Reconciliation</h2>
        <table><tr><td>Matched</td><td class="ok">all</td></tr><tr><td>Audit chain</td><td class="ok">intact</td></tr></table>
      </section>
    </main>
  </body>
</html>
