name: Build

"on":
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  foundry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
      - run: git clone --depth 1 https://github.com/foundry-rs/forge-std lib/forge-std
        working-directory: contracts
      - run: forge fmt --check
        working-directory: contracts
      - run: forge test -vvv
        working-directory: contracts

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: ruff check .
      - run: black --check .
      - run: mypy services/common services/auditlog services/custody services/settlement services/recon stackctl
      - run: pytest
      - name: sim demo
        run: |
          python -m stackctl demo --mode sim | tee demo.out
          grep -E "RECON: ALL MATCHED|AUDIT: CHAIN INTACT" demo.out
      - name: sim failure demos
        run: |
          python -m stackctl demo-failures --mode sim | tee failures.out
          grep -E "RECON: MISMATCH|UNWIND: COMPLETE|RESTRICTED: SURFACED|COUPON: NO DOUBLE PAYMENT|AUDIT: CHAIN INTACT" failures.out

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - name: compose up
        run: docker compose up --build -d
      - name: stack demo
        run: |
          python -m stackctl demo | tee demo.out
          grep -E "RECON: ALL MATCHED|AUDIT: CHAIN INTACT|COUPON: PAID 5 HOLDERS" demo.out
      - name: stack failure demos
        run: |
          python -m stackctl demo-failures | tee failures.out
          grep -E "RECON: MISMATCH|UNWIND: COMPLETE|RESTRICTED: SURFACED|RECON: ALL MATCHED|COUPON: NO DOUBLE PAYMENT|AUDIT: CHAIN INTACT" failures.out
      - name: custody pay smoke
        run: |
          python -m stackctl pay issuer investor-a 1000 | tee pay_auto.out
          grep -E '"status": "signed"' pay_auto.out
          python -m stackctl pay issuer investor-a 125000 | tee pay_dual.out
          grep -E '"status": "pending_approvals"' pay_dual.out
          INTENT_ID=$(jq -r .intent_id pay_dual.out)
          curl -fsS -X POST "http://localhost:8001/approvals/${INTENT_ID}/approve" \
            -H "Content-Type: application/json" -d '{"approver":"ops-1"}' | tee approve_1.out
          curl -fsS -X POST "http://localhost:8001/approvals/${INTENT_ID}/approve" \
            -H "Content-Type: application/json" -d '{"approver":"ops-2"}' | tee approve_2.out
          grep -E '"status":"approved_signed"|"status": "approved_signed"' approve_2.out
          CASH=$(docker compose exec -T custody python -c 'import json; print(json.load(open("/deployment/deployment.json"))["addresses"]["CashToken"])')
          INVESTOR_A=$(docker compose exec -T custody python -c 'import json; print(json.load(open("/deployment/deployment.json"))["personas"]["investor-a"])')
          BALANCE=$(docker compose exec -T anvil cast call "$CASH" "balanceOf(address)(uint256)" "$INVESTOR_A" --rpc-url http://localhost:8545 | awk '{print $1}')
          test "$BALANCE" = "626000"
      - name: compose logs
        if: failure()
        run: docker compose logs
      - name: compose down
        if: always()
        run: docker compose down --volumes

  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: banned vocabulary
        run: |
          if grep -RInE "revolutionary|seamless|game-changing|unlock|enterprise-grade|bank-grade|battle-tested" README.md ARCHITECTURE.md LIMITATIONS.md ROADMAP.md SECURITY.md CONTRIBUTING.md services stackctl contracts console; then
            exit 1
          fi
      - name: secret patterns
        run: |
          if grep -RInE "0x[a-fA-F0-9]{64}|sk-[A-Za-z0-9_-]{20,}|ghp_[A-Za-z0-9_]{20,}" . --exclude-dir=.git; then
            exit 1
          fi
