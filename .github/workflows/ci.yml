name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  services:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: ruff check .
      - run: black --check .
      - run: mypy services/common services/auditlog services/custody stackctl
      - run: pytest
      - run: make demo | tee demo.out
      - run: grep -E "RECON: ALL MATCHED|AUDIT: CHAIN INTACT" demo.out
      - run: make demo-failures | tee failures.out
      - run: grep -E "RECON: MISMATCH|UNWIND: COMPLETE|RESTRICTED: SURFACED|COUPON: NO DOUBLE PAYMENT|AUDIT: CHAIN INTACT" failures.out
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: banned vocabulary
        run: |
          ! grep -RInE "revolutionary|seamless|game-changing|unlock|enterprise-grade|bank-grade|battle-tested" README.md ARCHITECTURE.md LIMITATIONS.md ROADMAP.md SECURITY.md CONTRIBUTING.md services stackctl contracts console
      - name: secret patterns
        run: |
          ! grep -RInE "0x[a-fA-F0-9]{64}|sk-[A-Za-z0-9_-]{20,}|ghp_[A-Za-z0-9_]{20,}" . --exclude-dir=.git
